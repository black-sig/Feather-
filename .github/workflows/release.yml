name: iOS Build Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # يسمح بتشغيل السكربت يدوياً

jobs:
  build:
    # استخدام macOS 15 لضمان دعم أحدث نسخ Xcode و iOS 18
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        # نتأكد من اختيار نسخة Xcode 16.0 أو أحدث لدعم iOS 18
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Install Certificates and Profiles (Optional)
        # إذا كان لديك ملفات تعريف وتوقيع، ضع خطوات فك تشفيرها هنا
        run: echo "Preparing build environment..."

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project YourProject.xcodeproj \
            -scheme YourSchemeName \
            -archivePath $PWD/build/YourApp.xcarchive \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES

      - name: Export IPA
        # هذه الخطوة تتطلب وجود ملف ExportOptions.plist في المشروع
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/YourApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build/output

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-Build
          path: build/output/*.ipa
