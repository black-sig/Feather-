name: Build Feather IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15 # لضمان دعم iOS 18

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Verify Project File
        run: |
          if [ -d "Feather.xcodeproj" ]; then
            echo "Project file found."
          else
            echo "Error: Feather.xcodeproj not found in root directory!"
            ls -R # لعرض الملفات في حال كان المشروع داخل مجلد فرعي
            exit 1
          fi

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project Feather.xcodeproj \
            -scheme Feather \
            -archivePath $PWD/build/Feather.xcarchive \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES

      - name: Export IPA (Optional)
        # ملاحظة: هذه الخطوة تحتاج ملف ExportOptions.plist لتوليد ملف IPA نهائي
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Feather.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build/output
