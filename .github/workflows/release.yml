name: Build Feather Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً من GitHub

jobs:
  build:
    # استخدام macOS 15 لضمان توفر iOS 18 SDK
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # حل مشكلة Package.swift: سحب كافة المشاريع الفرعية (Submodules)
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode Version
        # اختيار Xcode 16 المخصص لنظام iOS 18
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Resolve Swift Packages
        # حل مشكلة الاعتمادات الخارجية قبل البدء بالبناء
        run: xcodebuild -resolvePackageDependencies -project Feather.xcodeproj -scheme Feather

      - name: Build Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project Feather.xcodeproj \
            -scheme Feather \
            -archivePath $PWD/build/Feather.xcarchive \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES

      - name: Prepare Unsigned IPA
        # هذه الخطوة تستخرج ملف الـ .app وتضعه في مجلد Payload لإنشاء ملف IPA غير موقع
        # مفيد جداً إذا كنت تنوي توقيعه لاحقاً عبر متجرك أو zsign
        run: |
          mkdir -p build/Payload
          cp -R build/Feather.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r Feather_Ready_To_Sign.ipa Payload

      - name: Upload Artifact
        # لرفع الملف الناتج وتنزيله من صفحة الـ Action
        uses: actions/upload-artifact@v4
        with:
          name: Feather-Build
          path: build/Feather_Ready_To_Sign.ipa
