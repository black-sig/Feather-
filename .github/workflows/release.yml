name: iOS Unsigned IPA Builder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  XCODE_PROJECT: "Feather.xcodeproj"
  XCODE_SCHEME: "Feather"

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode Environment and iOS Platform
        run: |
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          xcodebuild -downloadPlatform iOS

      - name: Resolve Swift Package Dependencies
        run: xcodebuild -resolvePackageDependencies -project ${{ env.XCODE_PROJECT }} -scheme ${{ env.XCODE_SCHEME }}

      - name: Build and Archive Project
        run: |
          mkdir -p build
          xcodebuild archive \
            -project ${{ env.XCODE_PROJECT }} \
            -scheme ${{ env.XCODE_SCHEME }} \
            -archivePath $PWD/build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            SKIP_INSTALL=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Extract and Generate Unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -qr Unsigned_App.ipa Payload
          echo "IPA build completed successfully."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA-Release
          path: build/Unsigned_App.ipa
          retention-days: 7
