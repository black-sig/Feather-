name: Build Void Store Pro (Fixed Version)

on:
  workflow_dispatch:

jobs:
  build:
    # استخدام أحدث نظام ماك متاح (يدعم Xcode 16 فأحدث)
    runs-on: macos-15
    
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 2. Setup Xcode (Latest)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # تحديث الإصدار ليتوافق مع تنسيق المشروع الجديد
          xcode-version: '16.0' 

      - name: 3. Install Dependencies
        run: |
          brew install ldid
          chmod +x ./Makefile || true

      - name: 4. Build Void Store
        run: |
          make clean || true
          make
          
          mkdir -p final_output
          if [ -d "packages" ]; then
            cp packages/*.ipa final_output/VoidStore_Pro.ipa
          else
            # بحث شامل عن الملف في حال تغير مسار المخرجات
            find . -name "*.ipa" -exec cp {} final_output/VoidStore_Pro.ipa \;
          fi

      - name: 5. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoidStore-Final-IPA
          path: final_output/VoidStore_Pro.ipa
