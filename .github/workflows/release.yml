name: Build Void Store Pro

on:
  workflow_dispatch: # تشغيل يدوي من الهاتف
  push:
    branches:
      - main # تشغيل تلقائي عند أي تعديل على الكود

jobs:
  build_production:
    name: Build & Package Void Store
    runs-on: macos-14
    
    steps:
      - name: 1. جلب الكود من المستودع
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 2. إعداد بيئة Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: 3. تنظيف وبناء التطبيق
        run: |
          # تنظيف أي ملفات بناء قديمة
          rm -rf _build packages
          
          # تحديث رقم الإصدار برمجياً
          agvtool new-version -all $(date +%H%M)
          
          # تشغيل عملية التجميع (Make)
          make clean
          make

      - name: 4. تجهيز ملف الـ IPA النهائي
        run: |
          mkdir -p final_output
          # البحث عن ملف الـ IPA الناتج وتغيير اسمه
          if [ -d "packages" ]; then
            mv packages/*.ipa final_output/VoidStore_Pro.ipa
          else
            echo "خطأ: لم يتم العثور على مجلد الحزم الناتجة!"
            exit 1
          fi

      - name: 5. رفع الملف لتتمكن من تحميله
        uses: actions/upload-artifact@v4
        with:
          name: VoidStore-Final-IPA
          path: final_output/VoidStore_Pro.ipa
          retention-days: 5 # سيبقى الملف متاحاً للتحميل لمدة 5 أيام
